<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuel Cell Real-Time SVG Dashboard</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socketio/3.1.3/socketio.min.js"></script>
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            padding: 10px 20px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            box-sizing: border-box;
        }
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 1600px; 
            margin-bottom: 8px; 
        }
        h1 {
            font-size: 21px; 
            color: #212529;
            margin: 0;
        }
        .nav-controls {
            display: flex;
            align-items: center;
            gap: 10px; 
        }
        .btn {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 6px 14px; 
            font-size: 13px; 
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .btn:hover {
            background-color: #0056b3;
        }
        .page-indicator {
            font-size: 12px;
            font-weight: 600;
            color: #495057;
            background: #e9ecef;
            padding: 5px 12px; 
            border-radius: 20px;
        }
        #dashboard-viewport {
            width: 100%;
            max-width: 1600px; 
            flex: 1; 
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            padding: 8px;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            margin-bottom: 10px;
        }
        svg {
            width: 100%;
            height: 100%; 
            max-height: 88vh; 
            object-fit: contain;
        }
        .status-msg {
            font-size: 16px;
            color: #6c757d;
            font-weight: 500;
            text-align: center;
        }
        .error-banner {
            display: none;
            width: 100%;
            max-width: 1600px;
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            padding: 10px 15px;
            border-radius: 6px;
            margin-bottom: 10px;
            font-family: monospace;
            font-size: 13px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div id="diagnostic-error-logger" class="error-banner"></div>

    <div class="header-container">
        <h1 id="page-title">Loading Dashboard Array...</h1>
        <div class="nav-controls">
            <button class="btn" onclick="changePage(-1)">◀ Prev</button>
            <span class="page-indicator" id="page-counter">0 / 0</span>
            <button class="btn" onclick="changePage(1)">Next ▶</button>
        </div>
    </div>

    <div id="dashboard-viewport">
        <div class="status-msg" id="fallback-status">Contacting Application Live Cache Pipeline...</div>
    </div>

<script>
        let dashboardPages = [];
        let currentPageIndex = 0;

        function logError(message, context) {
            console.error(`[${context} Error]:`, message);
            const banner = document.getElementById('diagnostic-error-logger');
            banner.style.display = 'block';
            banner.innerText = `System Error [Context: ${context}]: ${message}`;
        }

        function clearErrors() {
            document.getElementById('diagnostic-error-logger').style.display = 'none';
        }

        // 1. Fetch page metadata
        fetch('/api/pages')
            .then(res => {
                if (!res.ok) throw new Error(`Server returned HTTP code ${res.status}`);
                return res.json();
            })
            .then(data => {
                dashboardPages = data;
                if (dashboardPages.length > 0) {
                    clearErrors();
                    renderCurrentPage();
                } else {
                    document.getElementById('fallback-status').innerText = "Flask config.py contains an empty DASHBOARD_PAGES array.";
                }
            })
            .catch(err => {
                logError(err.message, "API_FETCH_FAILURE");
                document.getElementById('fallback-status').innerText = "Failed loading dashboard manifest mappings.";
            });

        // 2. Render vector asset frame contents
        function renderCurrentPage() {
            if (dashboardPages.length === 0) return;
            const activePage = dashboardPages[currentPageIndex];
            
            document.getElementById('page-title').innerText = activePage.title;
            document.getElementById('page-counter').innerText = `${currentPageIndex + 1} / ${dashboardPages.length}`;

            // We generate an aggressive cache breaker down to the exact millisecond
            const cacheBreaker = new Date().getTime();
            const targetUrl = `/live-static/${activePage.filename}?t=${cacheBreaker}`;

            fetch(targetUrl)
                .then(response => {
                    if (!response.ok) throw new Error(`HTTP ${response.status} - File missing or inaccessible.`);
                    return response.text();
                })
                .then(svgXML => {
                    clearErrors();
                    
                    // --- DIAGNOSTIC LOG ---
                    // Check if '777' exists anywhere inside the incoming data from the server
                    if (svgXML.includes("777")) {
                        console.log("🎯 SUCCESS: The fresh '777' value was found inside the downloaded SVG data!");
                    } else {
                        console.warn("⚠️ WARNING: The browser just fetched the file, but the text '777' is missing from the data sent by the server.");
                    }
                    // ----------------------

                    document.getElementById('dashboard-viewport').innerHTML = svgXML;
                })
                .catch(err => {
                    logError(err.message, "SVG_STREAM_RENDER_DELAY");
                });
        }

        function changePage(direction) {
            if (dashboardPages.length === 0) return;
            currentPageIndex = (currentPageIndex + direction + dashboardPages.length) % dashboardPages.length;
            renderCurrentPage();
        }

        // 3. Auto-Pull Backup Loop (Set to 1 second)
        setInterval(() => {
            renderCurrentPage();
        }, 1000); 

        // Left & Right Keyboard Shortcut Controls Map
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') changePage(1);
            if (e.key === 'ArrowLeft') changePage(-1);
        });
    </script>
</body>
</html>
