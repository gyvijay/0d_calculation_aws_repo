<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuel Cell Real-Time SVG Dashboard</title>
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            padding: 10px 20px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            box-sizing: border-box;
        }
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 1600px; 
            margin-bottom: 8px; 
        }
        h1 {
            font-size: 21px; 
            color: #212529;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .nav-controls {
            display: flex;
            align-items: center;
            gap: 10px; 
        }
        .btn {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 6px 14px; 
            font-size: 13px; 
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .btn:hover {
            background-color: #0056b3;
        }
        .page-indicator {
            font-size: 12px;
            font-weight: 600;
            color: #495057;
            background: #e9ecef;
            padding: 5px 12px; 
            border-radius: 20px;
        }
        #dashboard-viewport {
            width: 100%;
            max-width: 1600px; 
            flex: 1; 
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            padding: 8px;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            margin-bottom: 10px;
        }
        svg {
            width: 100%;
            height: 100%; 
            max-height: 88vh; 
            object-fit: contain;
        }
        .status-msg {
            font-size: 16px;
            color: #6c757d;
            font-weight: 500;
            text-align: center;
        }
        .error-banner {
            display: none;
            width: 100%;
            max-width: 1600px;
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            padding: 10px 15px;
            border-radius: 6px;
            margin-bottom: 10px;
            font-family: monospace;
            font-size: 13px;
            box-sizing: border-box;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            background-color: #ef4444;
            border-radius: 50%;
            display: inline-block;
        }
        .status-dot.connected {
            background-color: #10b981;
            box-shadow: 0 0 8px #10b981;
        }
    </style>
</head>
<body>

    <div id="diagnostic-error-logger" class="error-banner"></div>

    <div class="header-container">
        <h1 id="page-title">
            <span id="connection-indicator" class="status-dot"></span>
            Loading Dashboard Array...
        </h1>
        <div class="nav-controls">
            <button class="btn" onclick="changePage(-1)">◀ Prev</button>
            <span class="page-indicator" id="page-counter">0 / 0</span>
            <button class="btn" onclick="changePage(1)">Next ▶</button>
        </div>
    </div>

    <div id="dashboard-viewport">
        <div class="status-msg" id="fallback-status">Contacting Application Live Memory Pipeline...</div>
    </div>

    <script>
        let dashboardPages = [];
        let currentPageIndex = 0;
        let isFetching = false;
        let svgCache = {}; // 🌟 MEMORY CACHE: Holds layout templates locally

        function logError(message, context) {
            console.error(`[${context} Error]:`, message);
            const banner = document.getElementById('diagnostic-error-logger');
            banner.style.display = 'block';
            banner.innerText = `System Error [Context: ${context}]: ${message}`;
        }

        function clearErrors() {
            document.getElementById('diagnostic-error-logger').style.display = 'none';
        }

        // 1. Fetch layout map configurations
        function fetchPagesManifest() {
            fetch('/api/pages')
                .then(res => {
                    if (!res.ok) throw new Error(`Server returned HTTP code ${res.status}`);
                    return res.json();
                })
                .then(data => {
                    dashboardPages = data;
                    if (dashboardPages.length > 0) {
                        clearErrors();
                        
                        // Start tracking connection status immediately
                        const connectionDot = document.getElementById('connection-indicator');
                        if (connectionDot) connectionDot.classList.add('connected');
                        
                        // 🌟 PRE-FETCH ALL ASSETS INTO BROWSER MEMORY AT STARTUP
                        preloadAllAssets();
                        
                        // Fire background polling worker cycle
                        setInterval(syncLiveTelemetry, 2000);
                    } else {
                        document.getElementById('fallback-status').innerText = "Flask configuration pages array is empty.";
                    }
                })
                .catch(err => {
                    logError(err.message, "API_FETCH_FAILURE");
                    document.getElementById('fallback-status').innerText = "Failed loading dashboard maps.";
                });
        }

        // 🌟 Helper to fetch and cache all layouts concurrently
        function preloadAllAssets() {
            dashboardPages.forEach((page, index) => {
                fetch(`/live-static/${page.filename}?init=${Date.now()}`)
                    .then(res => res.text())
                    .then(svgXML => {
                        if (svgXML.includes('<svg')) {
                            svgCache[page.filename] = svgXML;
                            
                            // If this happens to be the page we are looking at right now, draw it instantly
                            if (index === currentPageIndex) {
                                switchPageUI();
                            }
                        }
                    })
                    .catch(err => console.error(`Error warm-caching ${page.filename}:`, err));
            });
        }

        // 🌟 INSTANT FRONTEND UI SWITCHER (0ms delay)
        function switchPageUI() {
            if (dashboardPages.length === 0) return;
            const activePage = dashboardPages[currentPageIndex];
            
            document.getElementById('page-title').innerHTML = `<span id="connection-indicator" class="status-dot connected"></span> ${activePage.title}`;
            document.getElementById('page-counter').innerText = `${currentPageIndex + 1} / ${dashboardPages.length}`;

            const fallbackStatus = document.getElementById('fallback-status');
            if (fallbackStatus) fallbackStatus.style.display = 'none';

            const viewport = document.getElementById('dashboard-viewport');
            
            // Check if we have this page warm cached inside local RAM variables
            if (svgCache[activePage.filename]) {
                viewport.innerHTML = svgCache[activePage.filename];
            } else {
                viewport.innerHTML = `<div class="status-msg">Loading Asset Struct from Warm Cache...</div>`;
            }
        }

        // 🌟 BACKGROUND RE-POLLER (Keeps values updating silently in place)
        function syncLiveTelemetry() {
            if (dashboardPages.length === 0 || isFetching) return;

            const activePage = dashboardPages[currentPageIndex];
            const cacheBreaker = Date.now();
            const targetUrl = `/live-static/${activePage.filename}?nocache=${cacheBreaker}`;

            isFetching = true;

            fetch(targetUrl, {
                method: 'GET',
                headers: {
                    'Cache-Control': 'no-cache, no-store, must-revalidate',
                    'Pragma': 'no-cache'
                }
            })
                .then(response => {
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    return response.text();
                })
                .then(svgXML => {
                    if (svgXML.includes('<svg')) {
                        clearErrors();
                        
                        // Silently save the freshest telemetry copy to cache for navigation
                        svgCache[activePage.filename] = svgXML;

                        // Parse out current live numbers inside view without resetting DOM structure focus
                        const viewport = document.getElementById('dashboard-viewport');
                        viewport.innerHTML = svgXML;
                    }
                })
                .catch(err => {
                    logError(err.message, "LIVE_TELEMETRY_SYNC_ERROR");
                })
                .finally(() => {
                    isFetching = false;
                });
        }

        function changePage(direction) {
            if (dashboardPages.length === 0) return;
            currentPageIndex = (currentPageIndex + direction + dashboardPages.length) % dashboardPages.length;
            
            // 🌟 STEP 1: Change layout instantaneously from browser RAM data variables
            switchPageUI();
            
            // STEP 2: Force trigger a silent telemetry query sweep right away to grab the values
            syncLiveTelemetry();
        }

        // Keyboard hotkeys mapping for Left & Right Arrows
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') changePage(1);
            if (e.key === 'ArrowLeft') changePage(-1);
        });

        // Initialize execution hook once document object structures are compiled
        document.addEventListener('DOMContentLoaded', fetchPagesManifest);
    </script>
</body>
</html>
